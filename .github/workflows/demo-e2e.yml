name: "(▶) Demo E2E Tests"

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      apps:
        description: "Apps to test (comma-separated: embedded,multi-region,uikit)"
        default: "embedded,multi-region,uikit"
        type: string
      shard_count:
        description: "Number of shards per app (1 = no sharding)"
        default: "1"
        type: string

concurrency:
  group: demo-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  matrix-setup:
    name: "Generate E2E Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrix
        id: generate
        env:
          INPUT_APPS: ${{ inputs.apps || 'embedded,multi-region,uikit' }}
          INPUT_SHARD_COUNT: ${{ inputs.shard_count || '1' }}
        run: node .github/scripts/generate_e2e_matrix.js

  e2e:
    name: "${{ matrix.app }} (shard ${{ matrix.shard-index }}/${{ matrix.shard-total }})"
    needs: matrix-setup
    runs-on: "macos-15-xlarge"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check macOS and Xcode versions
        run: |
          sw_vers
          xcode-select --print-path
          xcodebuild -version

      - name: Run ${{ matrix.app }} E2E tests (shard ${{ matrix.shard-index }}/${{ matrix.shard-total }})
        run: |
          set -o pipefail

          ONLY_TESTING="${{ matrix.only-testing }}"
          XCODEBUILD_ARGS=(
            -project "${{ matrix.project }}"
            -scheme "${{ matrix.scheme }}"
            -destination "platform=iOS Simulator,name=iPhone 16 Pro"
            -derivedDataPath "$RUNNER_TEMP/${{ matrix.app }}-e2e-derived-data"
            -resultBundlePath "$RUNNER_TEMP/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.xcresult"
            -parallel-testing-enabled NO
          )

          if [ -n "$ONLY_TESTING" ]; then
            for flag in $ONLY_TESTING; do
              XCODEBUILD_ARGS+=("$flag")
            done
          fi

          xcodebuild "${XCODEBUILD_ARGS[@]}" test \
            2>&1 | tee "$RUNNER_TEMP/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.log"

      - name: Publish E2E run summary
        if: always()
        run: |
          node .github/scripts/publish_e2e_summary.js \
            --log "$RUNNER_TEMP/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.log" \
            --catalog "${{ matrix.catalog }}" \
            --test-class "${{ matrix.test-class }}" \
            --app-label "${{ matrix.app }}" \
            --artifact-name "${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}-results" \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}-results
          path: |
            ${{ runner.temp }}/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.log
            ${{ runner.temp }}/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.xcresult
          retention-days: 7
