name: "(▶) Demo E2E Tests"

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      apps:
        description: "Apps to test (comma-separated: embedded,multi-region,uikit,auto-login)"
        default: "embedded,multi-region,uikit,auto-login"
        type: string
      shard_count:
        description: "Number of shards per app (1 = auto, max 4 tests/shard)"
        default: "1"
        type: string

concurrency:
  group: demo-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: "Unit Tests"
    runs-on: "macos-15-xlarge"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reset SwiftPM artifact cache
        run: bash .github/scripts/reset_swiftpm_artifact_cache.sh

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme FronteggSwift \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -only-testing:FronteggSwiftTests \
            -resultBundlePath "$RUNNER_TEMP/unit-tests.xcresult" \
            -enableCodeCoverage YES \
            -parallel-testing-enabled NO \
            2>&1 | tee "$RUNNER_TEMP/unit-tests.log"

      - name: Upload unit test artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-tests-results
          path: |
            ${{ runner.temp }}/unit-tests.log
            ${{ runner.temp }}/unit-tests.xcresult
          retention-days: 7

  matrix-setup:
    name: "Generate E2E Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      apps: ${{ steps.generate.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate matrix
        id: generate
        env:
          INPUT_APPS: ${{ inputs.apps || 'embedded,multi-region,uikit,auto-login' }}
          INPUT_SHARD_COUNT: ${{ inputs.shard_count || '1' }}
        run: |
          node .github/scripts/generate_e2e_matrix.js
          echo "apps=${INPUT_APPS}" >> "$GITHUB_OUTPUT"

  e2e:
    name: "${{ matrix.app }} (shard ${{ matrix.shard-index }}/${{ matrix.shard-total }})"
    needs: matrix-setup
    runs-on: "macos-15-xlarge"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reset SwiftPM artifact cache
        run: bash .github/scripts/reset_swiftpm_artifact_cache.sh

      - name: Run ${{ matrix.app }} E2E tests (shard ${{ matrix.shard-index }}/${{ matrix.shard-total }})
        run: |
          set -o pipefail

          ONLY_TESTING="${{ matrix.only-testing }}"
          XCODEBUILD_ARGS=(
            -project "${{ matrix.project }}"
            -scheme "${{ matrix.scheme }}"
            -destination "platform=iOS Simulator,name=iPhone 16 Pro"
            -derivedDataPath "$RUNNER_TEMP/${{ matrix.app }}-e2e-derived-data"
            -resultBundlePath "$RUNNER_TEMP/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.xcresult"
            -enableCodeCoverage YES
            -parallel-testing-enabled NO
            -retry-tests-on-failure
            -test-iterations 3
          )

          # CI-environment flakes — these tests pass locally but fail on
          # macos-15-xlarge runners (slow ASWebAuthenticationSession startup
          # poisons subsequent retry iterations). Tracked for proper fix.
          # See CONTRIBUTING.md → "Known CI-flaky tests".
          XCODEBUILD_ARGS+=(
            -skip-testing:demo-embedded-e2e/DemoEmbeddedE2ETests/testEmbeddedGoogleSocialLoginRecoversFromStalledSocialSuccessPage
          )

          if [ -n "$ONLY_TESTING" ]; then
            for flag in $ONLY_TESTING; do
              XCODEBUILD_ARGS+=("$flag")
            done
          fi

          xcodebuild "${XCODEBUILD_ARGS[@]}" test \
            2>&1 | tee "$RUNNER_TEMP/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.log"

      - name: Upload shard artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}-results
          path: |
            ${{ runner.temp }}/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.log
            ${{ runner.temp }}/${{ matrix.app }}-e2e-shard-${{ matrix.shard-index }}.xcresult
          retention-days: 7

  summary:
    name: "Combine Results & Summary"
    needs: [matrix-setup, e2e, unit-tests]
    if: always()
    runs-on: "macos-15-xlarge"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all shard artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/artifacts
          pattern: "*-e2e-shard-*-results"

      - name: Download unit test artifacts
        uses: actions/download-artifact@v8
        with:
          name: unit-tests-results
          path: ${{ runner.temp }}/artifacts/unit-tests-results

      - name: Generate combined summary
        run: |
          node .github/scripts/combine_e2e_summary.js \
            --artifacts-dir "$RUNNER_TEMP/artifacts" \
            --apps "${{ needs.matrix-setup.outputs.apps || 'embedded,multi-region,uikit,auto-login' }}" \
            --include-unit-tests true \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Build per-file coverage summary
        id: coverage_summary
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          XCRESULT="${{ runner.temp }}/artifacts/unit-tests-results/unit-tests.xcresult"
          if [ ! -d "$XCRESULT" ]; then
            echo "No xcresult bundle at $XCRESULT — skipping coverage summary."
            exit 0
          fi

          COVERAGE_JSON="${{ runner.temp }}/coverage.json"
          xcrun xccov view --report --files-for-target FronteggSwift --json "$XCRESULT" > "$COVERAGE_JSON" 2>/dev/null
          if [ ! -s "$COVERAGE_JSON" ]; then
            echo "xccov produced empty output — skipping coverage summary."
            exit 0
          fi

          git fetch --depth=1 origin master 2>/dev/null || true
          CHANGED="${{ runner.temp }}/changed-files.txt"
          git diff --name-only origin/master...HEAD | grep '^Sources/FronteggSwift/.*\.swift$' > "$CHANGED" || true

          if [ ! -s "$CHANGED" ]; then
            echo "No FronteggSwift source files changed — skipping coverage summary."
            exit 0
          fi

          BODY="${{ runner.temp }}/coverage-comment.md"
          {
            echo "<!-- coverage-summary -->"
            echo "## Coverage for changed FronteggSwift files"
            echo ""
            echo "| File | Line coverage | Covered / Total |"
            echo "|------|---------------|-----------------|"
            while IFS= read -r file; do
              base=$(basename "$file")
              row=$(node -e "
                const fs = require('fs');
                const data = JSON.parse(fs.readFileSync('$COVERAGE_JSON', 'utf8'));
                const files = Array.isArray(data) ? data : (data.files || []);
                const match = files.find(f => (f.path || f.name || '').endsWith('/$base') || (f.path || f.name || '') === '$base');
                if (!match) { process.stdout.write('| $file | n/a | n/a |'); return; }
                const pct = (match.lineCoverage * 100).toFixed(1);
                const covered = match.coveredLines ?? 'n/a';
                const total = match.executableLines ?? 'n/a';
                process.stdout.write(\`| $file | \${pct}% | \${covered} / \${total} |\`);
              " 2>/dev/null)
              if [ -z "$row" ]; then
                echo "| $file | n/a | n/a |"
              else
                echo "$row"
              fi
            done < "$CHANGED"
            echo ""
            echo "_Informational — no threshold is enforced. Coverage is for the \`FronteggSwift\` target unit-test run._"
          } > "$BODY"

          cat "$BODY" >> "$GITHUB_STEP_SUMMARY"
          echo "body_path=$BODY" >> "$GITHUB_OUTPUT"

      - name: Post or update coverage PR comment
        if: github.event_name == 'pull_request' && steps.coverage_summary.outputs.body_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BODY_PATH: ${{ steps.coverage_summary.outputs.body_path }}
        run: |
          set -e

          EXISTING_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq '.[] | select(.body | contains("<!-- coverage-summary -->")) | .id' \
            | head -n 1)

          if [ -n "$EXISTING_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
              --field body="@${BODY_PATH}"
          else
            gh pr comment "${PR_NUMBER}" --body-file "${BODY_PATH}"
          fi
