name: "(▶) Trigger E2E tests Workflow"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. release/next). Leave empty to use the branch you select below."
        required: false
      sha:
        description: "Commit SHA to test. Leave empty to use the selected branch's latest commit."
        required: false
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

jobs:
  trigger_e2e_tests_manual:
    name: "Trigger E2E tests (manual)"
    runs-on: 'ubuntu-latest'
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: "Resolve version and SHA (use branch head when inputs empty)"
        id: resolve
        run: |
          VERSION="${{ inputs.version }}"
          SHA="${{ inputs.sha }}"
          if [ -z "$VERSION" ]; then VERSION="${{ github.ref_name }}"; fi
          if [ -z "$SHA" ]; then SHA="${{ github.sha }}"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Using version=$VERSION sha=$SHA"

      - name: "Print inputs"
        run: |
          echo "Received test request for FronteggSwift @${{ steps.resolve.outputs.version }}"
          echo "SHA: ${{ steps.resolve.outputs.sha }}"

      - name: "Call trigger-e2e-test action"
        uses: ./.github/actions/trigger-e2e-test
        with:
          version: ${{ steps.resolve.outputs.version }}
          sha: ${{ steps.resolve.outputs.sha }}
          client_framework: 'swift-sdk'
          bot_app_id: ${{ secrets.GH_FRONTEGG_BOT_APP_ID }}
          bot_app_key: ${{ secrets.GH_FRONTEGG_BOT_APP_SECRET }}

  # Dispatches start-ios-sdk-e2e in e2e-system-tests (swift-sdk). That workflow posts the actual pass/fail check to this PR via the bot – require that check in branch protection, not this job.
  trigger_swift_sdk_e2e_on_release_pr:
    name: "Trigger Swift SDK E2E"
    runs-on: 'ubuntu-latest'
    if: github.event_name == 'pull_request'
    steps:
      - name: "Trigger Swift SDK E2E tests"
        uses: ./.github/actions/trigger-e2e-test
        with:
          version: ${{ github.event.pull_request.head.ref }}
          sha: ${{ github.event.pull_request.head.sha }}
          client_framework: 'swift-sdk'
          bot_app_id: ${{ secrets.GH_FRONTEGG_BOT_APP_ID }}
          bot_app_key: ${{ secrets.GH_FRONTEGG_BOT_APP_SECRET }}


